ath`,{d:`M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2`,key:`e791ji`}]]),pe=T(`upload`,[[`path`,{d:`M12 3v12`,key:`1x0j5s`}],[`path`,{d:`m17 8-5-5-5 5`,key:`7q97r8`}],[`path`,{d:`M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4`,key:`ih7n3h`}]]),O=T(`user`,[[`path`,{d:`M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2`,key:`975kel`}],[`circle`,{cx:`12`,cy:`7`,r:`4`,key:`17ys0d`}]]),k=T(`x`,[[`path`,{d:`M18 6 6 18`,key:`1bl5f8`}],[`path`,{d:`m6 6 12 12`,key:`d8bk6v`}]]),me=JSON.parse('[{"id":"q1","teacher":"王晓琴 微电子所","question":"1、在哪找的文献","answer":"在保研或科研中，寻找高质量的文献主要有以下核心渠道：\\n\\n1. **IEEE Xplore**：电气电子工程与计算机领域的“圣经”级数据库。绝大多数顶会（ISSCC, VLSI, CICC, A-SSCC 等）和顶刊（JSSC, TCAS 等）论文均在此检索。\\n2. **Google Scholar（谷歌学术）**：最全面的学术搜索引擎，用于追踪论文引用情况（Citation）和寻找论文的开源 PDF 版本。\\n3. **Web of Science**：用于精准检索高水平期刊论文，支持通过“引文分析”追踪该领域的源头文献或前沿热点。\\n4. **学校图书馆数据库**：配合学校 VPN 可以免费下载各大数据库（Elsevier, Springer, Wiley 等）的全文文献。\\n5. **科研公众号与社区**：如知乎相关专栏、研之成理、研路同行等，有许多师兄师姐整理的文献阅读笔记和研究方向指南。","tags":["文献检索","学术常识"],"date":"默认数据"},{"id":"q2","teacher":"王晓琴 微电子所","question":"2、模拟ic设计领域有哪些会议或者期刊","answer":"集成电路（IC）设计领域的学术成果发布高度依赖**顶级会议**，其影响力甚至超过许多期刊。以下是模拟 IC 领域最核心的会议和期刊汇总：\\n\\n### 一、顶级国际会议 (Conferences)\\n\\n1. **ISSCC (International Solid-State Circuits Conference)**\\n   - **地位**：国际固态电路会议，被誉为集成电路设计领域的**“奥林匹克”**。\\n   - **特点**：绝对的 Top 1 会议。要求极严，通常要求必须有成功的流片（Tape-out）和详尽的测试结果，并且各项核心指标需要达到世界领先水平。工业界巨头（如 Intel, Samsung, TSMC）和顶尖高校都会在此发布年度重磅技术。\\n2. **VLSI (Symposia on VLSI Technology and Circuits)**\\n   - **地位**：超大规模集成电路研讨会，与 ISSCC 齐名的顶级会议。\\n   - **特点**：会议分为 Technology（工艺）和 Circuits（电路）两个方向。其电路方向的难度和含金量极高，非常看重电路设计与先进半导体工艺的结合。\\n3. **CICC (IEEE Custom Integrated Circuits Conference)**\\n   - **地位**：定制集成电路会议，北美顶级 IC 会议。\\n   - **特点**：相比于 ISSCC 对极致指标的追求，CICC 非常偏重于工程应用、系统架构创新和工业界实用技术。很多极具实用价值的模拟和混合信号 IC 创新都发表于此。\\n4. **ESSCIRC & A-SSCC (European / Asian Solid-State Circuits Conference)**\\n   - **地位**：分别为欧洲和亚洲最高级别的固态电路会议。\\n   - **特点**：两者与 ISSCC, VLSI, CICC 并列为 IC 领域的“五大核心会议”。A-SSCC 近年来随着亚洲半导体产业的崛起，影响力和录用难度不断攀升。\\n\\n### 二、顶级学术期刊 (Journals)\\n\\n在模拟 IC 领域，期刊文章通常是会议文章的**扩充版 (Extended version)**，需要提供更详尽的理论分析、电路推导和更全面的测试数据。\\n\\n1. **JSSC (IEEE Journal of Solid-State Circuits)**\\n   - **地位**：固态电路期刊，集成电路设计领域毫无争议的 **No.1 顶级期刊**。\\n   - **特点**：难度极大。很多文章是 ISSCC 或 VLSI 等顶会论文的扩充版。如果一篇模拟电路的文章能发在 JSSC 上，代表其具备极高的学术和工程价值。\\n2. **TCAS-I (IEEE Transactions on Circuits and Systems I: Regular Papers)**\\n   - **地位**：电路与系统领域的顶级期刊（偏长文）。\\n   - **特点**：含金量仅次于 JSSC。与 JSSC 强烈的“重测试、重系统”不同，TCAS-I 更侧重于电路理论的深入探讨、数学建模分析和系统级架构创新。如果你的模拟设计在理论推导上非常扎实，这是一个极佳的去处。\\n3. **TCAS-II (IEEE Transactions on Circuits and Systems II: Express Briefs)**\\n   - **地位**：电路与系统领域的顶级期刊（偏短文，常为4-5页快报）。\\n4. **TVLSI (IEEE Transactions on Very Large Scale Integration Systems)**\\n   - **地位**：超大规模集成系统顶级期刊。虽然数字 IC 和体系结构的文章偏多，但也包含大量优秀的混合信号与电源管理类文章。","tags":["模拟IC","学术会议","期刊"],"date":"默认数据"},{"id":"q3","teacher":"王晓琴 微电子所","question":"3、LDO的功耗由哪些部分组成","answer":"低压差线性稳压器（LDO）的总功耗由**动态功耗**（导通功耗）和**静态功耗**（内部待机功耗）两部分组成。\\n\\n### 核心公式\\n$$\\nP_{total} = P_{dynamic} + P_{static}\\n$$\\n$$\\nP_{total} = (V_{in} - V_{out}) \\\\times I_{out} + V_{in} \\\\times I_q\\n$$\\n\\n---\\n\\n### 1. 动态功耗 (Dynamic Power - $P_{dynamic}$)\\n这也就是通常所说的**导通功耗**或**压降损耗**。\\n\\n- **公式推导**：\\n  $$\\n  P_{dynamic} = (V_{in} - V_{out}) \\\\times I_{out}\\n  $$\\n- **产生原因**：LDO 的核心是一个起调整作用的功率管（Pass Device，通常是 PMOS 或 NMOS）。你可以把它想象成一个“智能的可变电阻”。为了把较高的输入电压（$V_{in}$）降到稳定的输出电压（$V_{out}$），这个功率管必须“吃掉”多余的电压差。当负载抽取电流（$I_{out}$）时，这个电流必须穿过功率管，于是就产生了 $(V_{in} - V_{out}) \\\\times I_{out}$ 的热损耗。\\n- **致命场景**：当压差大（例如 5V 降到 1.2V）且负载电流大（例如 500mA）时，动态功耗会急剧飙升，占据总功耗的绝对主导地位。这也是为什么 LDO 效率低、容易发热，且不适合用于大压降、大电流场景的根本原因。\\n\\n---\\n\\n### 2. 静态功耗 (Static Power - $P_{static}$)\\n这也就是通常所说的**内部功耗**或**待机功耗**。\\n\\n- **公式推导**：\\n  $$\\n  P_{static} = V_{in} \\\\times I_q\\n  $$\\n- **产生原因**：这里的 $I_q$ 叫做静态电流（Quiescent Current），即接地电流（$I_{gnd}$）。即使不接任何负载（即 $I_{out} = 0$），LDO 内部的电路（如带隙基准源 Bandgap、误差放大器 Error Amplifier、分压反馈网络）为了维持负反馈工作，也需要消耗一定的基准电流。这些维持 LDO “醒着”的电流总和，乘以输入电压，就是静态功耗。\\n- **致命场景**：当设备处于待机或睡眠模式时。此时负载几乎不抽电流，动态功耗降为 0，电池的续航时间就完全取决于这部分静态功耗。对于穿戴设备、IoT 传感器等依靠小电池供电的设备，IC 设计师会绞尽脑汁将 $I_q$ 做到纳安（nA）级别。","tags":["模拟IC","电源管理","LDO"],"date":"默认数据"},{"id":"q4","teacher":"王晓琴 微电子所","question":"4、什么是内存墙","answer":"**内存墙 (Memory Wall)** 是指：处理器的运算速度（如 CPU/GPU 算力）提升得太快，而内存的访问速度（如 DRAM 的 Latency 和 Bandwidth）提升得太慢，导致处理器在绝大多数时间里都在“傻傻地”等待内存传输数据，空有一身算力却无处施展的瓶颈现象。\\n\\n---\\n\\n### 1. 内存墙是如何形成的？\\n这个问题根源于半导体产业在过去几十年中的**发展不对称**：\\n- **CPU 的飞速狂飙**：过去几十年，根据摩尔定律，处理器的性能以每年大约 50%～60% 的速度爆炸式增长。\\n- **内存的步履蹒跚**：相比之下，作为主流内存的 DRAM（动态随机存取内存），其访问延迟（Latency）每年只能改善大约 5%～7%。\\n- **剪刀差的诞生**：随着时间推移，这两者的速度差演变成了巨大的“剪刀差”。CPU 可以在不到 1 纳秒内完成一次计算，但从内存读取一个数据却可能需要高达 50~100 纳秒。在 CPU 眼中，去内存拿一次数据，就像是“天上一天，地上一年”。\\n\\n---\\n\\n### 2. 内存墙带来的致命后果\\n- **“冯·诺依曼瓶颈”被无限放大**：经典冯·诺依曼架构中，程序指令和数据都存储在内存中。当 CPU 执行速度远超内存传输速度时，整个系统的实际性能就完全取决于内存的吞吐量。\\n- **算力严重浪费**：即使现在的 CPU 动辄拥有几十个核心，在运行大型复杂任务时，很多核心经常处于闲置（Stall）状态，一直在等待数据被载入缓存。\\n- **AI 时代的雪上加霜**：现在的深度学习和大语言模型（LLM）需要处理数以百亿、千亿计的参数，这些参数在训练和推理时需要频繁地在计算单元（GPU/TPU/NPU）和内存之间来回吞吐，带宽限制使得内存墙成为 AI 进化的最大瓶颈。\\n\\n---\\n\\n### 3. 主流的解决方案\\n\\n#### 🚀 传统的续命方案：多级缓存 (Cache Hierarchy)\\n芯片设计师在 CPU 内部塞入了速度极快、但容量很小的 SRAM 作为缓存 (L1, L2, L3 Cache)。先把数据加载到 Cache 中，让 CPU 尽可能少地直接去访问慢速的 DRAM 主存。\\n\\n#### 🚀 拓宽马路：HBM (高带宽内存)\\n- **原理**：HBM 采用 3D 堆叠技术，把多层 DRAM 芯片像摩天大楼一样叠在一起，并通过硅通孔（TSV）技术连接，然后利用中介层（Interposer）将这个堆叠内存与 GPU/CPU 封装在同一个芯片内。\\n- **结果**：HBM 的位宽可以达到 1024 位甚至更高（传统 DDR 仅为 64 位），带来了恐怖的带宽提升，是目前 AI 显卡（如 NVIDIA H100, B200）抗衡内存墙的王牌。\\n\\n#### 🚀 终极颠覆：存内计算 / 近存计算 (PIM/CIM)\\n- **原理**：存算一体（Computing in Memory）技术直接利用存储介质（如 SRAM、ReRAM、Flash）本身的物理特性或逻辑门，在存储阵列内部完成矩阵乘法等运算，完全省去了数据在“处理器”与“存储器”之间频繁搬运的功耗和延迟。","tags":["体系结构","存储系统","AI芯片"],"date":"默认数据"},{"id":"q5","teacher":"谭闵 华中科技大学","question":"5、密勒补偿的原理是什么","answer":"**密勒补偿 (Miller Compensation)** 是模拟集成电路设计中（特别是在两级运算放大器中）最常用的一种**极点分裂 (Pole Splitting)** 技术，用于稳定负反馈环路，防止电路发生自激振荡。\\n\\n### 核心物理原理：密勒效应 (Miller Effect)\\n当一个反相放大器（如运放的第二阶段）的输入和输出之间跨接一个电容 $C_c$（密勒电容）时，从输入端看去，该电容会被等效放大。等效电容值大约为：\\n$$\\nC_{eq} \\\\approx (1 + |A_{v2}|) C_c\\n$$\\n其中 $A_{v2}$ 是第二级放大电路的电压增益。由于 $A_{v2}$ 通常非常大，因此在第一级输出端会引入一个巨大的等效电容，从而将主极点推向极低的频率。\\n\\n---\\n\\n### 极点分裂 (Pole Splitting)\\n在未进行补偿前，两级运放的两个极点相对接近，容易导致系统相角裕度不足。引入密勒电容 $C_c$ 后：\\n\\n1. **主极点 ($p_1$) 向低频移动**：\\n   $$\\n   p_1 \\\\approx -\\\\frac{1}{R_1 (1 + g_{m2} R_2) C_c} \\\\approx -\\\\frac{1}{g_{m2} R_1 R_2 C_c}\\n   $$\\n   其中 $R_1, R_2$ 分别为第一、二级输出阻抗，$g_{m2}$ 为第二级跨导。主极点主导了带宽限制。\\n\\n2. **非主极点 ($p_2$) 向高频移动**：\\n   $$\\n   p_2 \\\\approx -\\\\frac{g_{m2}}{C_L + C_1} \\\\approx -\\\\frac{g_{m2}}{C_L}\\n   $$\\n   其中 $C_L$ 为负载电容，$C_1$ 为第一级输出寄生电容。非主极点被推向更远的高频，远离了单位增益带宽（GBW）。\\n\\n**结果**：主极点和非主极点被成功拉开（极点分裂），运放的相角裕度（Phase Margin）显著增大，反馈环路稳定性大大提升。\\n\\n---\\n\\n### 右半平面零点问题 (RHP Zero)\\n密勒电容不仅提供了反馈路径，还引入了一条从第一级输出直接向前传递到第二级输出的**前馈通路**。这会导致在复频域引入一个**右半平面零点 (Right Half-Plane Zero, $z_z$)**：\\n$$\\nz_z = \\\\frac{g_{m2}}{C_c}\\n$$\\n- **危害**：右半平面零点会增加增益（斜率变为 $+20\\\\text{dB/dec}$），但却会引入**负的相位延迟**（与极点相同）。这会极大地削弱相角裕度，使电路依然容易不稳定。\\n\\n---\\n\\n### 消除 RHP 零点的常用方案\\n1. **引入零点消除电阻 (Nulling Resistor, $R_z$)**：\\n   在 $C_c$ 支路上串联一个电阻 $R_z$，此时零点公式变为：\\n   $$\\n   z_z = \\\\frac{1}{C_c \\\\left(\\\\frac{1}{g_{m2}} - R_z\\\\right)}\\n   $$\\n   - **方案 A ($R_z = 1/g_{m2}$)**：将右半平面零点直接推向**无穷大**，彻底消除其影响。\\n   - **方案 B ($R_z > 1/g_{m2}$)**：将零点移动到**左半平面 (LHP)**，此时它可以提供正相位补偿，甚至可以调节 $R_z$ 的阻值让左半平面零点正好抵消非主极点 $p_2$（即令 $z_z = p_2$），从而大幅拓宽运放带宽。\\n2. **引入电压缓冲器 (Buffer)**：\\n   在反馈通路中串联一个单向源极跟随器（Source Follower），只允许信号从第二级输出反馈回第一级，完全阻断前馈通路，从而消除零点。","tags":["模拟IC","电路基础","极点补偿"],"date":"默认数据"},{"id":"q6","teacher":"学长分享","question":"6、为什么CMOS电路中上拉网络用PMOS，下拉网络用NMOS？","answer":"**CMOS反相器与逻辑门中，上拉网络使用PMOS、下拉网络使用NMOS，是因为MOS管的物理传输特性决定了它们的“强/弱传递”特点**：\\n\\n1. **NMOS的传输特性**：\\n   - **强 0（Strong 0）**：当源极（Source）接地，栅极（Gate）为高电平时，NMOS导通并可以将输出端拉到完全的地面电平（$0\\\\text{V}$），没有阈值电压损失。\\n   - **弱 1（Weak 1）**：如果用NMOS传输高电平（例如漏极接 $V_{DD}$，栅极接 $V_{DD}$），当源极电平上升到 $V_{DD} - V_{thN}$ 时，NMOS将进入截止区。因此输出只能达到 $V_{DD} - V_{thN}$，存在阈值损失。若考虑体效应（Body Effect），阈值电压 $V_{thN}$ 会进一步增加，使得输出电压更低。\\n\\n2. **PMOS the 传输特性**：\\n   - **强 1（Strong 1）**：当源极接 $V_{DD}$，栅极接 $0\\\\text{V}$ 时，PMOS导通并可以将输出端完全拉到 $V_{DD}$，没有阈值损失。\\n   - **弱 0（Weak 0）**：如果用PMOS传输低电平，当漏极接 $0\\\\text{V}$ 时，源极电压降到 $|V_{thP}|$ 附近时PMOS便会截止，因此输出无法完全达到 $0\\\\text{V}$。\\n\\n---\\n\\n### 换错位置的致命后果（如果上拉用NMOS，下拉用PMOS）：\\n- **输出电平损失**：逻辑高电平退化为 $V_{DD} - V_{thN}$，逻辑低电平退化为 $|V_{thP}|$。\\n- **静态功耗急剧增加**：由于输出电平达不到完整的 $V_{DD}$ 或 $0\\\\text{V}$，下一级CMOS的反相器中NMOS和PMOS将无法完全截止，从而产生持续的**静态短路电流（Static Short-circuit Current）**，导致系统静态功耗暴增，并大幅削弱噪声裕度（Noise Margin）。\\n\\n因此，在标准CMOS工艺中，**上拉网络必须由PMOS构成以确保输出强1，下拉网络必须由NMOS构成以确保输出强0**。","tags":["数字IC","电路基础","MOS管特性"],"date":"2026-06-29"},{"id":"q7","teacher":"学长分享","question":"7、版图设计中接触孔（Contact）与通孔（Via）的区别？不同层如何电气连接？","answer":"在集成电路版图（Layout）设计中，**接触孔（Contact）**和**通孔（Via）**都用于不同导电层之间的垂直电气连接，但它们连接的层和工艺步骤有所不同：\\n\\n### 1. 接触孔（Contact）\\n- **定义**：用于**最底层金属（Metal 1）与非金属半导体层**之间的连接。\\n- **连接层**：连接第一层金属（M1）到有源区（Active Area，如源漏极 $N^+/P^+$）或多晶硅栅（Poly Gate）。\\n- **工艺**：其深宽比较大，通常在制造晶体管源漏和栅极之后、沉淀第一层隔离介质后进行刻蚀填金。\\n\\n### 2. 通孔（Via）\\n- **定义**：用于**金属层与金属层**之间的连接。\\n- **连接层**：例如 Via1 连接 Metal 1 和 Metal 2；Via2 连接 Metal 2 和 Metal 3，以此类推。在先进工艺中，也存在“跳层通孔”或“叠孔（Stacked Via）”。\\n- **工艺**：通常在高层金属互连线制作期间，在层间介质（ILD）中刻蚀并填充金属（如钨或铜）。\\n\\n---\\n\\n### 不同层之间的电气连接原则：\\n- **同层不相交**：如果两根导线位于同一金属层（如都是 M1）且相互交叉，它们在物理上是直接短路的。\\n- **异层不短路**：如果一根导线在 M1，另一根在 M2，即使它们在二维版图上重叠交叉，在物理上也是被绝缘介质隔开的，**不会短路**。\\n- **跨层连接**：必须显式地放置对应的通孔（如 Via1）才能将它们连接。如果要从多晶硅（Poly）连接到高层金属 M4，信号必须先通过 **Contact** 跳到 M1，再通过 **Via1** 跳到 M2，再通过 **Via2** 跳到 M3，最后通过 **Via3** 到达 M4。在版图设计中，多层叠在一起的通孔需要细心分层显示以防对准出错。","tags":["版图设计","工艺常识","物理互连"],"date":"2026-06-29"},{"id":"q8","teacher":"学长分享","question":"8、版图设计中如果电源和地短路（LVS报错Short），如何快速排查？","answer":"电源线（VDD）和地线（GND）在版图中网格极其庞大，遍布整个芯片。一旦 LVS 验证报错“VDD and GND Short”，在几十万个管子中寻找物理短路点非常困难。以下是业内最常用的**快速二分排查法（Binary Isolation Method）**：\\n\\n### 1. 逻辑与网络隔离二分法（最常用）\\n1. **断开主要支路**：不要在物理上把所有金属切断，而是先从版图的高层金属桥接处（或者电源环 Ring 与条线 Stripe 的连接处）进行临时切断。\\n2. **将电路一分为二**：将整个芯片的电源网格切成两个相对独立的区域（A区和B区）。\\n3. **重新跑 LVS / 提取网络**：\\n   - 如果只有 A 区报错 VDD-GND 短路，说明短路点在 A 区。\\n   - 如果两区都不短路，说明短路点正好在刚才切断的连接线处。\\n4. **递归缩小范围**：对报错的区域继续进行二分切断，通常只需 4~5 次定位，就能将短路范围缩小到一个很小的单元（Cell）或局部的几根信号线之内。\\n5. **物理修复并恢复连接**：找到具体的交叉短路点（如金属层错放、多余的 Contact 等）修复后，再把临时切断的地方连回去。\\n\\n### 2. 借助 EDA 工具的热点与高亮功能\\n- **Calibre RVE Short Finder**：现在的 LVS 工具（如 Mentor Calibre）提供了专门的 Short 追踪器。它会通过电学阻抗计算或路径追踪，高亮显示一条从 VDD 到 GND 的**最小可能短路路径（Short Path）**。沿着这条高亮路径走，通常能一眼看到叠错的 Via 或粘连的 Metal。\\n- **电压降法（若在测试台级）**：如果是芯片流片后测试时发现电源地短路，可以利用红外热成像仪（Thermal Imaging）通入小电流，短路点的发热量最大，可以在热像图上直接呈现出亮斑（Hot Spot）。","tags":["版图设计","LVS验证","调试技巧"],"date":"2026-06-29"},{"id":"q9","teacher":"学长分享","question":"9、简述双阱 CMOS 工艺的基本步骤（从硅片准备到钝化压焊）？","answer":"在现代集成电路制造中，双阱（Twin-well）CMOS 工艺可以在同一个 P 型衬底上同时制作高质量的 NMOS 和 PMOS。其核心制造流程主要分为以下几个阶段：\\n\\n### 1. 衬底与阱区制作 (Well Formation)\\n- **硅片准备**：选用轻掺杂的 P 型单晶硅片（P-substrate），并在表面生长外延层。\\n- **N阱与P阱注入**：通过光刻定义区域，向硅片中分别注入磷（N型杂质，形成N阱以制作PMOS）和硼（P型杂质，形成P阱以制作NMOS）。\\n- **阱推进（Drive-in）**：高温退火，使注入的杂质向深处扩散，形成均匀的阱区分布。\\n\\n### 2. 器件隔离区制作 (Isolation)\\n- **浅沟槽隔离 (STI, Shallow Trench Isolation)**：在不需要制作管子的场区（Field Area）刻蚀出深槽，填充二氧化硅（$SiO_2$）并用化学机械抛光（CMP）平整化，用于隔离相邻的晶体管，防止寄生漏电。\\n\\n### 3. 栅极制作 (Gate Stack)\\n- **阈值电压调整注入**：向通道区微量注入杂质，以精确设定 NMOS 和 PMOS 的阈值电压 $V_{th}$。\\n- **栅氧化层生长**：通过热氧化在表面生长一层极薄的高质量二氧化硅（或高介电常数介质 High-k）。\\n- **多晶硅沉积与刻蚀**：沉积多晶硅（Poly-Si）层，光刻并刻蚀出栅极图案。利用**自对准（Self-aligned）**技术，多晶硅栅本身将作为后续源漏注入的掩膜。\\n\\n### 4. 源漏极制作 (Source/Drain Junction)\\n- **轻掺杂漏极（LDD）注入**：注入低浓度杂质以抑制短沟道效应和热载流子退化。\\n- **侧墙制作（Spacer）**：在多晶硅栅两侧制作二氧化硅侧墙。\\n- **源漏重掺杂注入**：PMOS 注入高浓度的硼（$P^+$ 源漏），NMOS 注入高浓度的砷（$N^+$ 源漏）。然后进行急冷退火（RTA）激活杂质。\\n\\n### 5. 金属互连与后道工序 (BEOL)\\n- **接触孔制作（Contact）**：沉积层间介质（ILD），光刻并刻蚀出接触孔，填充金属钨（W）。\\n- **多层金属互连**：交替沉积金属层（如铝或铜）和层间介质，通过通孔（Via）将不同金属层垂直连通，完成电路布线。\\n- **钝化层与压焊孔 (Passivation & Pad)**：在芯片最表面覆盖一层致密的钝化层（如氮化硅 $Si_3N_4$）以阻挡水分和杂质。最后光刻开出压焊孔（Pad Window），露出金属用于引线键合（Wire Bonding）。","tags":["制造工艺","CMOS流程","器件物理"],"date":"2026-06-29"},{"id":"q10","teacher":"学长分享","question":"10、MOS管有哪些寄生电容？各自对应的物理成因与计算关系？","answer":"MOS晶体管在高速或高频工作时，其寄生电容会严重限制电路的动态响应和工作速度。MOS管的寄生电容主要分为**栅极电容**和**源漏结电容**两大类：\\n\\n### 1. 栅极相关电容 (Gate Capacitances)\\n这些电容是由栅极多晶硅、栅氧化层（$C_{ox}$）以及通道/源漏区构成的：\\n- **栅源/栅漏电容 ($C_{GS}, C_{GD}$)**：\\n  - **成因**：由两部分组成：第一是栅极与源/漏漏极在物理结构上的**几何交叠电容（Overlap Capacitance, $C_{ov}$）**，这部分与通道长度无关，与宽度 $W$ 成正比（$C_{ov} = W \\\\cdot C_{ol}$）；第二是通道开启后，通道电荷与栅极之间的**固有电容（Intrinsic Capacitance）**。\\n  - **工作区变化**：\\n    - *截止区*：通道未建立，$C_{GS} = C_{GD} = C_{ov}$。\\n    - *线性区*：通道均匀建立，$C_{GS} \\\\approx C_{GD} \\\\approx \\\\frac{1}{2} W L C_{ox} + C_{ov}$。\\n    - *饱和区*：通道在漏端夹断，$C_{GD} \\\\approx C_{ov}$（几乎为零），而所有的通道固有电容都分给了源端，$C_{GS} \\\\approx \\\\frac{2}{3} W L C_{ox} + C_{ov}$。\\n- **栅衬底电容 ($C_{GB}$)**：\\n  - **成因**：栅极与衬底之间的电容。在截止区最大（$C_{GB} \\\\approx W L C_{ox}$），在通道导通后，由于通道的反型层电荷屏蔽了衬底，此时 $C_{GB}$ 几乎降为零。\\n\\n### 2. 源漏结电容 (Junction Capacitances)\\n- **源衬底/漏衬底电容 ($C_{SB}, C_{DB}$)**：\\n  - **成因**：源漏极 $N^+/P^+$ 反型注入区与 $P/N$ 衬底（或阱）之间形成的**PN结耗尽区电容**。这是一种反向偏置的变容二极管电容。\\n  - **计算关系**：包含两部分：\\n    1. **底面积电容**：PN结底面面积 $A_D$（$W \\\\times L_{diff}$）乘以单位面积电容 $C_j$。\\n    2. **侧墙周长电容**：源漏极外侧与有源区侧墙相接的周长 $P_D$（$2W + 2L_{diff}$，但靠栅极的一侧通常不算或算作特殊侧墙）乘以单位长度电容 $C_{jsw}$。\\n    $$C_{DB} = A_D \\\\cdot C_j(V_{DB}) + P_D \\\\cdot C_{jsw}(V_{DB})$$\\n  - **电压依赖性**：因为是反偏PN结，耗尽层宽度随反向偏压 $V_{DB}$ 增加而变宽，因此**结电容随反向偏压升高而降低**。","tags":["器件物理","寄生电容","高频模型"],"date":"2026-06-29"},{"id":"q11","teacher":"学长分享","question":"11、模拟芯片与数字芯片在工艺、设计方法和MOS管工作区上的区别？","answer":"模拟电路与数字电路处理信号的形式不同，决定了它们在底层器件和整体设计方法学上的巨大差异：\\n\\n### 1. MOS管的工作区域区别 (Operating Regions)\\n- **数字电路（开关状态）**：\\n  - MOS管主要作为**压控电子开关**使用。在逻辑切换过程中，MOS管在**截止区（Off，阻抗极高）**与**线性区/电阻区（On，阻抗极低，$V_{DS}$ 极小）**之间快速切换。数字电路追求切换速度快、开关损耗低。\\n- **模拟电路（放大状态）**：\\n  - MOS管主要作为**放大器**或**恒流源**。为了获得高跨导（$g_m$）、高输出阻抗（$r_o$）以及高线性度，模拟放大电路中的MOS管必须稳定地工作在**饱和区（Saturation Region，又称恒流区 / 放大区）**，即满足条件 $V_{GS} > V_{th}$ 且 $V_{DS} \\\\ge V_{GS} - V_{th}$。\\n\\n### 2. 设计方法学区别 (Design Methodologies)\\n- **数字芯片（自上而下 Top-Down）**：\\n  - 采用**高度自动化**的设计流程。设计师使用 Verilog/VHDL 等硬件描述语言编写代码，通过 EDA 工具自动进行逻辑综合、自动时序分析、自动布局布线（APR），生成标准单元版图。人工干预少，适合设计规模达数亿个晶体管的复杂系统。\\n- **模拟芯片（自下而上 Bottom-Up）**：\\n  - 采用**手动定制（Full-Custom）**的设计流程。由于非理想效应多（噪声、匹配、对称性、寄生参数等），设计师必须在电路图级别手动设计晶体管尺寸，在版图级别**手工绘制布线（Manual Layout）**，并进行详尽的 SPICE 级晶体管仿真。设计规模一般在几十到几千个晶体管之间，但极度依赖工程经验。\\n\\n### 3. 工艺制程要求区别 (Process Technology)\\n- **数字芯片（追求先进纳米制程）**：\\n  - 极度追求摩尔定律的红利。使用最新的先进纳米工艺（如 $3\\\\text{nm}, 5\\\\text{nm}$ FinFET），以减小芯片面积、降低单门功耗、提高运算时钟频率。\\n- **模拟芯片（偏好成熟、高压工艺）**：\\n  - **不追求最先进的制程**。相反，特征线宽过小会导致严重二级效应（如短沟道效应、热载流子注入、漏电暴增、本征增益降低），从而恶化模拟性能。模拟芯片常用成熟工艺（如 $0.18\\\\mu\\\\text{m}$, $0.28\\\\mu\\\\text{m}$, $28\\\\text{nm}$），并且需要兼容高工作电压、高线性度电容（MIM电容）和高精度电阻。","tags":["数模对比","设计流程","制造制程"],"date":"2026-06-29"},{"id":"q12","teacher":"学长分享","question":"12、套筒式与折叠式共源共栅运放（Telescopic vs Folded-Cascode）优缺点对比？","answer":"共源共栅（Cascode）结构是单级放大器中提高增益的主流手段。**套筒式（Telescopic）**和**折叠式（Folded-Cascode）**是两种最经典的高性能单级共源共栅运放：\\n\\n```carousel\\n```\\n### 1. 套筒式共源共栅运放 (Telescopic Cascode)\\n- **结构特点**：输入管和共源共栅管串联在**同一条电流支路**上，如同套筒一样直通。\\n- **优点**：\\n  - **速度最快**：由于只有一条电流通路，极点较少，单位增益带宽（GBW）和工作频率最高。\\n  - **功耗最低**：相同的偏置电流下，支路数最少，静态功耗最低。\\n  - **噪声极小**：器件数量较少，且折射到输入端的等效噪声贡献比折叠式小得多。\\n- **缺点**：\\n  - **输出摆幅极窄**：输出端堆叠了 5 个晶体管（通常是 2个PMOS负载 + 2个NMOS共源共栅 + 1个NMOS输入管），留给输出摆幅的空间仅为：\\n    $$V_{swing} = V_{DD} - (V_{OD1} + V_{OD2} + V_{OD3} + V_{OD4} + V_{OD5})$$\\n  - **输入共模范围 (ICMR) 窄**：输入共模下限极易使输入管退出饱和区，导致很难将输入与输出短路做成单位增益缓冲器（Buffer）。\\n\\n---\\n\\n### 2. 折叠式共源共栅运放 (Folded-Cascode)\\n- **结构特点**：输入差分对的电流在拐角处被**“折叠”**，输入管和共源共栅管工作在**相反的导电类型**（例如输入管是 NMOS，共源共栅管是 PMOS）和**不同的电流支路**中。\\n- **优点**：\\n  - **输出摆幅大**：由于电流折叠，输出端堆叠的管子数变少，输出电压摆幅显著大于套筒式。\\n  - **输入共模范围（ICMR）极宽**：输入共模甚至可以允许低于地电平（若使用PMOS输入）或高于电源轨，**输入和输出端可以直接短接**作为 Buffer 工作，实用性极强。\\n- **缺点**：\\n  - **功耗大**：由于需要额外的电流偏置支路，功耗几乎是套筒式的两倍。\\n  - **速度较慢**：折叠节点（Folded Node）引入了较大的寄生电容，在折叠处产生了一个非主极点，降低了相位裕度，限制了最高工作带宽。\\n  - **噪声大**：折叠支路的偏置电流源管会向输出端注入额外的寄生噪声和失调电压。","tags":["模拟IC","运放架构","电路设计"],"date":"2026-06-29"},{"id":"q13","teacher":"学长分享","question":"13、源极跟随器（共漏放大器 / CD）的特性、增益以及在电路中的核心作用？","answer":"**源极跟随器（Source Follower，也称共漏极放大器 Common Drain）**是模拟电路中极其重要的基础子结构，其输入信号在栅极，输出信号在源极（输出跟随输入变化）。\\n\\n### 1. 核心电路参数\\n- **小信号电压增益 ($A_v$)**：\\n  考虑到体效应（$g_{mb}$），其小信号增益为：\\n  $$A_v = \\\\frac{g_m}{g_m + g_{mb} + 1/r_o + 1/R_S} \\\\approx \\\\frac{g_m}{g_m + g_{mb}} < 1$$\\n  其电压增益始终小于 1（通常在 0.8 ~ 0.9 左右），不具备电压放大能力。\\n- **输入阻抗 ($R_{in}$)**：极高（低频下无限大）。\\n- **输出阻抗 ($R_{out}$)**：低。从输出端往里看，等效阻抗为：\\n  $$R_{out} \\\\approx \\\\frac{1}{g_m + g_{mb}} \\\\parallel r_o \\\\parallel R_S \\\\approx \\\\frac{1}{g_m}$$\\n  因为 $g_m$ 较大，所以输出电阻通常只有几十到几百欧姆。\\n\\n---\\n\\n### 2. 在电路中的三大核心作用\\n\\n#### 🚀 作用一：阻抗变换与电流驱动缓冲 (Buffer)\\n由于其**高输入阻抗、低输出阻抗**的物理特性，它常常作为**缓冲器（Buffer）**插入在两级电路之间。它可以“阻隔”前级电路受到后级负载重压的影响：\\n- 第一级（如共源级 CS）提供高电压增益，但输出阻抗高，无法直接驱动重负载（小电阻或大电容）。\\n- 插入源极跟随器后，共源级只需驱动跟随器极小的栅电容；而跟随器凭借其低输出阻抗，可以轻松驱动后面的小阻性负载，避免增益严重衰减。\\n\\n#### 🚀 作用二：直流电位平移 (Level Shifting)\\n源极跟随器的输入输出端存在一个直流通路压差：\\n$$V_{out} = V_{in} - V_{GS} = V_{in} - (V_{th} + V_{OD})$$\\n这使得它可以在不损耗交流信号的前提下，将信号的直流电位向下平移 $V_{GS}$（若为 NMOS 跟随器）或向上平移 $|V_{GS}|$（若为 PMOS 跟随器）。这在多级直接耦合放大电路的偏置电压匹配中极为关键。\\n\\n#### 🚀 作用三：在反馈回路中消除右半平面零点\\n在米勒补偿运算放大器中，可以在反馈电容 $C_c$ 的通路中串联一个源极跟随器（或电压缓冲器）。由于跟随器是单向传输信号的，它只允许信号从输出端反馈回输入端，而**阻断了前馈通路**，从而能够彻底消除由于电容直接前馈引起的致命**右半平面零点（RHP Zero）**，显著提高运放稳定性。","tags":["模拟IC","基本放大级","缓冲级"],"date":"2026-06-29"},{"id":"q14","teacher":"学长分享","question":"14、共源共栅（Cascode）放大器的优缺点，以及增益自举（Gain Boosting）的原理和副作用？","answer":"在单级放大器中，普通的共源级（CS）增益被本征增益限制为 $g_m r_o$。为了进一步压榨单级电路的电压增益，设计师会使用 **Cascode（共源共栅）** 及其变体 **Gain Boosting（增益自举）**：\\n\\n### 1. 共源共栅放大器 (Cascode)\\n- **原理**：将一个共源管 $M_1$（输入管）和一个共栅管 $M_2$ 堆叠在一起。\\n- **增益提升机制**：共栅管 $M_2$ 将阻抗放大了 $g_{m2}r_{o2}$ 倍。其输出阻抗为：\\n  $$R_{out} \\\\approx (g_{m2} r_{o2}) r_{o1}$$\\n  因此其电压增益被提升为：\\n  $$A_v \\\\approx -g_{m1} R_{out} \\\\approx -(g_{m1} r_{o1}) (g_{m2} r_{o2}) \\\\propto (g_m r_o)^2$$\\n  比普通放大级增益大了一个本征增益倍数（可达 $40\\\\text{dB} \\\\sim 60\\\\text{dB}$）。\\n- **优点**：增益高；共栅管屏蔽了输入输出，消除了输入管 $M_1$ 的**米勒效应**，频率特性极佳。\\n- **缺点**：消耗了额外的额外电压裕度（Headroom），输出电压摆幅严重受限。\\n\\n---\\n\\n### 2. 增益自举技术 (Gain Boosting)\\n- **提出背景**：在先进工艺中，由于沟道长度调制效应严重，即使使用双管 Cascode 增益也依然不够。但如果堆叠三层管子（$A_v \\\\propto (g_m r_o)^3$），留给输出摆幅的电压就几乎为零了。这就诞生了**增益自举（Gain Boosting）**。\\n- **工作原理**：\\n  在 Cascode 管 $M_2$ 的栅极上，不接静态偏置电压，而是**插入一个辅助放大器 $A_{add}$**：\\n  - 辅助放大器的正输入端接 $M_1$ 的漏极（$M_2$ 的源极），输出端接 $M_2$ 的栅极，形成局部负反馈。\\n  - 当输出端电压产生波动时，反馈回路会强制锁定 $M_2$ 源端的电位，使其输出阻抗被进一步放大了 $A_{add} + 1$ 倍：\\n    $$R_{out} \\\\approx (A_{add} + 1) g_{m2} r_{o2} r_{o1}$$\\n    $$A_v \\\\approx -(g_{m1} r_{o1})(g_{m2} r_{o2}) \\\\cdot A_{add} \\\\propto (g_m r_o)^2 A_{add}$$\\n  - **结果**：在完全不牺牲输出摆幅（因为管子堆叠数仍为两层）的前提下，将电压增益拔高了 $A_{add}$ 倍（可达 $80\\\\text{dB} \\\\sim 100\\\\text{dB}$）。\\n- **增益自举的致命副作用（Doublet 问题）**：\\n  增益自举中引入的辅助放大器会在整体放大器的传输函数中引入一对**零极点对（Doublet）**。如果辅助放大器的带宽设计不当（通常要求辅助放大器的单位增益带宽 $f_{u,add}$ 大于主放大器闭环带宽，但小于主放大器的非主极点）：\\n  - 这对零极点对无法完全重合抵消，会在频率响应中产生微小的“凹坑”或阻抗突变。\\n  - **后果**：这会在时域阶跃响应中产生一个极其缓慢的**拖尾效应（Slow Settling Tail）**，使得电路需要花费极长的时间才能最终建立稳定，严重恶化高速开关电容电路（如 ADC、电荷泵）的建立时间性能。","tags":["模拟IC","增益自举","高频设计"],"date":"2026-06-29"},{"id":"q15","teacher":"学长分享","question":"15、模拟集成电路中为什么常用电流源进行偏置，而不是直接用电压源？","answer":"在模拟集成电路设计中，为放大管提供合适的工作点（Bias Point）是首要工作。在实际工程中，**我们几乎总是使用电流源（如电流镜分发电流）来为电路提供偏置，而绝不直接使用电压源**。这背后的核心原因如下：\\n\\n### 1. 极其剧烈的温度和工艺敏感度 (PVT Variations)\\n- **对 BJT 器件**：其集电极电流对基射极电压 $V_{BE}$ 呈**指数关系**：\\n  $$I_C = I_S \\\\exp\\\\left(\\\\frac{V_{BE}}{V_T}\\\\right)$$\\n  $V_{BE}$ 只要发生几个毫伏（mV）的极小波动（比如电源噪声或温度变化导致 $V_{BE}$ 偏置微漂），集电极电流 $I_C$ 就会发生**成倍或成数量级的剧烈暴增/暴跌**，直接导致工作点脱离饱和区而失效。\\n- **对 MOS 器件**：电流与过驱动电压呈**平方关系**：\\n  $$I_D = \\\\frac{1}{2} \\\\mu_n C_{ox} \\\\frac{W}{L} (V_{GS} - V_{th})^2$$\\n  由于半导体制造工艺中，阈值电压 $V_{th}$ 会产生严重的工艺偏差（Corner 变化，可达 $\\\\pm 100\\\\text{mV}$）。如果直接给栅极施加恒定电压 $V_{GS}$，在不同的芯片上，过驱动电压 $V_{GS} - V_{th}$ 会大相径庭，导致不同芯片的静态电流和跨导 $g_m$ 严重失控。\\n\\n---\\n\\n### 2. 电流源偏置的自我调节机制 (Current Mirror Biasing)\\n- 如果我们使用一个**基准电流源**（如 Bandgap 产生的基准电流）通过**电流镜（Current Mirror）**将电流分发到各个放大级中：\\n  - **工作点直接锁定**：放大管的静态电流 $I_D$ 被强行固定为基准电流的镜像比例。无论芯片的 $V_{th}$ 发生多大偏移、工作温度如何变化，MOS管的漏极电流 $I_D$ 都保持恒定。\\n  - **栅极偏置电压自适应调整**：为了维持这个恒定的 $I_D$，MOS管的栅源电压 $V_{GS}$ 会在内部**自适应地抬高或降低**以补偿 $V_{th}$ 和 $\\\\mu_n$ 的工艺偏差。\\n  - **跨导与增益稳定**：电流恒定也稳定了管子的跨导 $g_m \\\\approx \\\\sqrt{2\\\\mu C_{ox} (W/L) I_D}$，从而使放大器的增益在不同的工艺角和温度下都具有极佳的鲁棒性（Robustness）。","tags":["模拟IC","偏置技术","可靠性设计"],"date":"2026-06-29"},{"id":"q16","teacher":"学长分享","question":"16、二极管连接（Diode-connected）的 MOS 管为什么总是工作在饱和区？","answer":"在模拟电路（如电流镜的输入端、有源负载级）中，经常能看到将 MOS 管的**栅极（Gate）和漏极（Drain）直接短接**的结构，这被称为 **二极管连接的 MOS 管（Diode-connected MOS）**。\\n\\n### 证明二极管连接的 MOS 必然工作在饱和区：\\n\\n根据 MOS 管的工作区域判定条件：\\n1. **导通条件**：\\n   二极管连接的管子如果要流过电流，其栅源电压必须大于阈值电压：\\n   $$V_{GS} > V_{th}$$\\n   \\n2. **饱和区判定条件**：\\n   MOS 管工作在饱和区（恒流区）必须满足：\\n   $$V_{DS} \\\\ge V_{GS} - V_{th}$$\\n   \\n3. **带入短接条件**：\\n   由于栅极和漏极是直接用导线短路连接在一起的，因此在任何物理状态下，它们的电压电平绝对相等，即：\\n   $$V_{DS} = V_{GS}$$\\n   \\n4. **比较大小**：\\n   将 $V_{DS} = V_{GS}$ 代入饱和判定不等式：\\n   $$V_{GS} \\\\ge V_{GS} - V_{th}$$\\n   两边消去 $V_{GS}$，不等式简化为：\\n   $$0 \\\\ge -V_{th} \\\\implies V_{th} \\\\ge 0$$\\n   \\n- **结论**：对于增强型（Enhancement）MOS 晶体管（无论是 NMOS 还是 PMOS，其 $V_{th} > 0$ 或 $|V_{thP}| > 0$），**$V_{th} \\\\ge 0$ 这个不等式永远成立**。\\n- 因此，**只要 Diode-connected MOS 管有电流流过（即满足导通条件 $V_{GS} > V_{th}$），它就绝对、无条件地工作在饱和区。** 它永远不可能进入线性区（电阻区）。","tags":["模拟IC","器件判定","电流镜基础"],"date":"2026-06-29"},{"id":"q17","teacher":"学长分享","question":"17、带隙基准电压源（Bandgap Reference）的温度补偿物理实现原理？","answer":"带隙基准源（BGR）的目标是产生一个**与温度无关（零温度系数）的稳定参考电压 $V_{REF}$**。在硅芯片中，这是通过将两个具有**相反温度系数的电压按特定比例相加**实现的：\\n\\n### 1. 负温度系数电压 (CTAT)\\n- **物理来源**：双极型晶体管（BJT）的基射极结电压 $V_{BE}$。\\n- **特性**：PN 结的 $V_{BE}$ 随着温度的升高而**线性减小**。在室温下，其温度系数约为：\\n  $$\\\\frac{\\\\partial V_{BE}}{\\\\partial T} \\\\approx -2\\\\text{mV/}^{\\\\circ}\\\\text{C}$$\\n  因此 $V_{BE}$ 被称为 **CTAT (Complementary to Absolute Temperature)** 电压。\\n\\n---\\n\\n### 2. 正温度系数电压 (PTAT)\\n- **物理来源**：两个工作在**不同电流密度**下的 BJT 器件的基射极电压差（$\\\\Delta V_{BE}$）。\\n- **特性**：将两个发射极面积比例为 $1:N$ 的三极管通入相等的电流，它们的电压差为：\\n  $$\\\\Delta V_{BE} = V_{BE1} - V_{BE2} = V_T \\\\ln(N) = \\\\left(\\\\frac{k T}{q}\\\\right) \\\\ln(N)$$\\n  其中 $V_T = k T / q$ 是热电压，与绝对温度 $T$ 成正比。对温度求导可得：\\n  $$\\\\frac{\\\\partial \\\\Delta V_{BE}}{\\\\partial T} = \\\\frac{k}{q} \\\\ln(N)$$\\n  由于 $k, q, N$ 均为正数，该电压随温度升高而**线性增加**。这被称为 **PTAT (Proportional to Absolute Temperature)** 电压。在室温下其温漂约为 $+0.086 \\\\ln(N) \\\\text{mV/}^{\\\\circ}\\\\text{C}$。\\n\\n---\\n\\n### 3. 零温漂相加与带隙电压值\\n- **温度补偿公式**：\\n  我们将 CTAT 电压（$V_{BE}$）与放大 $K$ 倍的 PTAT 电压（$\\\\Delta V_{BE}$）相加：\\n  $$V_{REF} = V_{BE} + K \\\\cdot \\\\Delta V_{BE} = V_{BE} + K \\\\cdot V_T \\\\ln(N)$$\\n- **温度系数归零条件**：\\n  要实现零温度系数，必须令导数为 0：\\n  $$\\\\frac{\\\\partial V_{REF}}{\\\\partial T} = \\\\frac{\\\\partial V_{BE}}{\\\\partial T} + K \\\\cdot \\\\frac{k}{q} \\\\ln(N) = 0$$\\n  代入室温数值：\\n  $$-2\\\\text{mV/}^{\\\\circ}\\\\text{C} + K \\\\cdot 0.086 \\\\ln(N) \\\\text{mV/}^{\\\\circ}\\\\text{C} = 0 \\\\implies K \\\\ln(N) \\\\approx 23.2$$\\n- **带隙基准电压值**：\\n  当温度系数完全补偿为 0 时，相加得到的参考电压 $V_{REF}$ 恰好等于：\\n  $$V_{REF} \\\\approx V_{BE} + 23.2 \\\\cdot V_T \\\\approx 0.7\\\\text{V} + 23.2 \\\\times 26\\\\text{mV} \\\\approx 1.25\\\\text{V}$$\\n  这个值正好对应**硅在绝对零度 ($0\\\\text{K}$) 时的禁带宽度电压（Bandgap Voltage, $\\\\approx 1.205\\\\text{V}$）**，这也是“带隙基准”名称的物理来源。","tags":["模拟IC","带隙基准","温度补偿"],"date":"2026-06-29"}]');function he(e){var t,n,r=``;if(typeof e==`string`||typeof e==`number`)r+=e;else if(typeof e==`object`)if(Array.isArray(e)){var i=e.length;for(t=0;t<i;t++)e[t]&&(n=he(e[t]))&&(r&&(r+=` `),r+=n)}else for(n in e)e[n]&&(r&&(r+=` `),r+=n);return r}function ge(){for(var e,t,n=0,r=``,i=arguments.length;n<i;n++)(e=arguments[n])&&(t=he(e))&&(r&&(r+=` `),r+=t);return r}var _e=(e,t)=>{let n=Array(e.length+t.length);for(let t=0;t<e.length;t++)n[t]=e[t];for(let r=0;r<t.length;r++)n[e.length+r]=t[r];return n},ve=(e,t)=>({classGroupId:e,validator:t}),ye=(e=new Map,t=null,n)=>({nextPart:e,validators:t,classGroupId:n}),be=`-`,xe=[],Se=`arbitrary..`,Ce=e=>{let t=Ee(e),{conflictingClassGroups:n,conflictingClassGroupModifiers:r}=e;return{getClassGroupId:e=>{if(e.startsWith(`[`)&&e.endsWith(`]`))return Te(e);let n=e.split(b
