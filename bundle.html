*“奥林匹克”**。\\n   - **特点**：绝对的 Top 1 会议。要求极严，通常要求必须有成功的流片（Tape-out）和详尽的测试结果，并且各项核心指标需要达到世界领先水平。工业界巨头（如 Intel, Samsung, TSMC）和顶尖高校都会在此发布年度重磅技术。\\n2. **VLSI (Symposia on VLSI Technology and Circuits)**\\n   - **地位**：超大规模集成电路研讨会，与 ISSCC 齐名的顶级会议。\\n   - **特点**：会议分为 Technology（工艺）和 Circuits（电路）两个方向。其电路方向的难度和含金量极高，非常看重电路设计与先进半导体工艺的结合。\\n3. **CICC (IEEE Custom Integrated Circuits Conference)**\\n   - **地位**：定制集成电路会议，北美顶级 IC 会议。\\n   - **特点**：相比于 ISSCC 对极致指标的追求，CICC 非常偏重于工程应用、系统架构创新和工业界实用技术。很多极具实用价值的模拟和混合信号 IC 创新都发表于此。\\n4. **ESSCIRC & A-SSCC (European / Asian Solid-State Circuits Conference)**\\n   - **地位**：分别为欧洲和亚洲最高级别的固态电路会议。\\n   - **特点**：两者与 ISSCC, VLSI, CICC 并列为 IC 领域的“五大核心会议”。A-SSCC 近年来随着亚洲半导体产业的崛起，影响力和录用难度不断攀升。\\n\\n### 二、顶级学术期刊 (Journals)\\n\\n在模拟 IC 领域，期刊文章通常是会议文章的**扩充版 (Extended version)**，需要提供更详尽的理论分析、电路推导和更全面的测试数据。\\n\\n1. **JSSC (IEEE Journal of Solid-State Circuits)**\\n   - **地位**：固态电路期刊，集成电路设计领域毫无争议的 **No.1 顶级期刊**。\\n   - **特点**：难度极大。很多文章是 ISSCC 或 VLSI 等顶会论文的扩充版。如果一篇模拟电路的文章能发在 JSSC 上，代表其具备极高的学术和工程价值。\\n2. **TCAS-I (IEEE Transactions on Circuits and Systems I: Regular Papers)**\\n   - **地位**：电路与系统领域的顶级期刊（偏长文）。\\n   - **特点**：含金量仅次于 JSSC。与 JSSC 强烈的“重测试、重系统”不同，TCAS-I 更侧重于电路理论的深入探讨、数学建模分析和系统级架构创新。如果你的模拟设计在理论推导上非常扎实，这是一个极佳的去处。\\n3. **TCAS-II (IEEE Transactions on Circuits and Systems II: Express Briefs)**\\n   - **地位**：电路与系统领域的顶级期刊（偏短文，常为4-5页快报）。\\n4. **TVLSI (IEEE Transactions on Very Large Scale Integration Systems)**\\n   - **地位**：超大规模集成系统顶级期刊。虽然数字 IC 和体系结构的文章偏多，但也包含大量优秀的混合信号与电源管理类文章。","tags":["模拟IC","学术会议","期刊"],"date":"默认数据"},{"id":"q3","teacher":"王晓琴 微电子所","question":"3、LDO的功耗由哪些部分组成","answer":"低压差线性稳压器（LDO）的总功耗由**动态功耗**（导通功耗）和**静态功耗**（内部待机功耗）两部分组成。\\n\\n### 核心公式\\n$$\\nP_{total} = P_{dynamic} + P_{static}\\n$$\\n$$\\nP_{total} = (V_{in} - V_{out}) \\\\times I_{out} + V_{in} \\\\times I_q\\n$$\\n\\n---\\n\\n### 1. 动态功耗 (Dynamic Power - $P_{dynamic}$)\\n这也就是通常所说的**导通功耗**或**压降损耗**。\\n\\n- **公式推导**：\\n  $$\\n  P_{dynamic} = (V_{in} - V_{out}) \\\\times I_{out}\\n  $$\\n- **产生原因**：LDO 的核心是一个起调整作用的功率管（Pass Device，通常是 PMOS 或 NMOS）。你可以把它想象成一个“智能的可变电阻”。为了把较高的输入电压（$V_{in}$）降到稳定的输出电压（$V_{out}$），这个功率管必须“吃掉”多余的电压差。当负载抽取电流（$I_{out}$）时，这个电流必须穿过功率管，于是就产生了 $(V_{in} - V_{out}) \\\\times I_{out}$ 的热损耗。\\n- **致命场景**：当压差大（例如 5V 降到 1.2V）且负载电流大（例如 500mA）时，动态功耗会急剧飙升，占据总功耗的绝对主导地位。这也是为什么 LDO 效率低、容易发热，且不适合用于大压降、大电流场景的根本原因。\\n\\n---\\n\\n### 2. 静态功耗 (Static Power - $P_{static}$)\\n这也就是通常所说的**内部功耗**或**待机功耗**。\\n\\n- **公式推导**：\\n  $$\\n  P_{static} = V_{in} \\\\times I_q\\n  $$\\n- **产生原因**：这里的 $I_q$ 叫做静态电流（Quiescent Current），即接地电流（$I_{gnd}$）。即使不接任何负载（即 $I_{out} = 0$），LDO 内部的电路（如带隙基准源 Bandgap、误差放大器 Error Amplifier、分压反馈网络）为了维持负反馈工作，也需要消耗一定的基准电流。这些维持 LDO “醒着”的电流总和，乘以输入电压，就是静态功耗。\\n- **致命场景**：当设备处于待机或睡眠模式时。此时负载几乎不抽电流，动态功耗降为 0，电池的续航时间就完全取决于这部分静态功耗。对于穿戴设备、IoT 传感器等依靠小电池供电的设备，IC 设计师会绞尽脑汁将 $I_q$ 做到纳安（nA）级别。","tags":["模拟IC","电源管理","LDO"],"date":"默认数据"},{"id":"q4","teacher":"王晓琴 微电子所","question":"4、什么是内存墙","answer":"**内存墙 (Memory Wall)** 是指：处理器的运算速度（如 CPU/GPU 算力）提升得太快，而内存的访问速度（如 DRAM 的 Latency 和 Bandwidth）提升得太慢，导致处理器在绝大多数时间里都在“傻傻地”等待内存传输数据，空有一身算力却无处施展的瓶颈现象。\\n\\n---\\n\\n### 1. 内存墙是如何形成的？\\n这个问题根源于半导体产业在过去几十年中的**发展不对称**：\\n- **CPU 的飞速狂飙**：过去几十年，根据摩尔定律，处理器的性能以每年大约 50%～60% 的速度爆炸式增长。\\n- **内存的步履蹒跚**：相比之下，作为主流内存的 DRAM（动态随机存取内存），其访问延迟（Latency）每年只能改善大约 5%～7%。\\n- **剪刀差的诞生**：随着时间推移，这两者的速度差演变成了巨大的“剪刀差”。CPU 可以在不到 1 纳秒内完成一次计算，但从内存读取一个数据却可能需要高达 50~100 纳秒。在 CPU 眼中，去内存拿一次数据，就像是“天上一天，地上一年”。\\n\\n---\\n\\n### 2. 内存墙带来的致命后果\\n- **“冯·诺依曼瓶颈”被无限放大**：经典冯·诺依曼架构中，程序指令和数据都存储在内存中。当 CPU 执行速度远超内存传输速度时，整个系统的实际性能就完全取决于内存的吞吐量。\\n- **算力严重浪费**：即使现在的 CPU 动辄拥有几十个核心，在运行大型复杂任务时，很多核心经常处于闲置（Stall）状态，一直在等待数据被载入缓存。\\n- **AI 时代的雪上加霜**：现在的深度学习和大语言模型（LLM）需要处理数以百亿、千亿计的参数，这些参数在训练和推理时需要频繁地在计算单元（GPU/TPU/NPU）和内存之间来回吞吐，带宽限制使得内存墙成为 AI 进化的最大瓶颈。\\n\\n---\\n\\n### 3. 主流的解决方案\\n\\n#### 🚀 传统的续命方案：多级缓存 (Cache Hierarchy)\\n芯片设计师在 CPU 内部塞入了速度极快、但容量很小的 SRAM 作为缓存 (L1, L2, L3 Cache)。先把数据加载到 Cache 中，让 CPU 尽可能少地直接去访问慢速的 DRAM 主存。\\n\\n#### 🚀 拓宽马路：HBM (高带宽内存)\\n- **原理**：HBM 采用 3D 堆叠技术，把多层 DRAM 芯片像摩天大楼一样叠在一起，并通过硅通孔（TSV）技术连接，然后利用中介层（Interposer）将这个堆叠内存与 GPU/CPU 封装在同一个芯片内。\\n- **结果**：HBM 的位宽可以达到 1024 位甚至更高（传统 DDR 仅为 64 位），带来了恐怖的带宽提升，是目前 AI 显卡（如 NVIDIA H100, B200）抗衡内存墙的王牌。\\n\\n#### 🚀 终极颠覆：存内计算 / 近存计算 (PIM/CIM)\\n- **原理**：存算一体（Computing in Memory）技术直接利用存储介质（如 SRAM、ReRAM、Flash）本身的物理特性或逻辑门，在存储阵列内部完成矩阵乘法等运算，完全省去了数据在“处理器”与“存储器”之间频繁搬运的功耗和延迟。","tags":["体系结构","存储系统","AI芯片"],"date":"默认数据"}]');var c=i("2YQ6R");let _=b("chevron-down",[["path",{d:"m6 9 6 6 6-6",key:"qrunsl"}]]),P=b("chevron-up",[["path",{d:"m18 15-6-6-6 6",key:"153udz"}]]),j=b("square-pen",[["path",{d:"M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7",key:"1m0v6g"}],["path",{d:"M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z",key:"ohrbg2"}]]),L=b("tag",[["path",{d:"M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z",key:"vktsd0"}],["circle",{cx:"7.5",cy:"7.5",r:".5",fill:"currentColor",key:"kqv944"}]]),T=b("trash-2",[["path",{d:"M10 11v6",key:"nco0om"}],["path",{d:"M14 11v6",key:"outv1u"}],["path",{d:"M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6",key:"miytrc"}],["path",{d:"M3 6h18",key:"d0wm0j"}],["path",{d:"M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",key:"e791ji"}]]),A=b("user",[["path",{d:"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2",key:"975kel"}],["circle",{cx:"12",cy:"7",r:"4",key:"17ys0d"}]]);var c=i("2YQ6R");function O(){for(var e,t,n=0,r="",l=arguments.length;n<l;n++)(e=arguments[n])&&(t=function e(t){var n,r,l="";if("string"==typeof t||"number"==typeof t)l+=t;else if("object"==typeof t)if(Array.isArray(t)){var a=t.length;for(n=0;n<a;n++)t[n]&&(r=e(t[n]))&&(l&&(l+=" "),l+=r)}else for(r in t)t[r]&&(l&&(l+=" "),l+=r);return l}(e))&&(r&&(r+=" "),r+=t);return r}var M={};Object.defineProperty(M,Symbol.toStringTag,{value:"Module"});let R=(e=new Map,t=null,n)=>({nextPart:e,validators:t,classGroupId:n}),$=[],I=(e,t,n)=>{if(0==e.length-t)return n.classGroupId;let r
